# El Cartel - konfigurowalne wiadomosci kar.
# Kody kolorow: & (np. &c=czerwony, &7=szary, &l=pogrubienie, &r=reset).
# Placeholdery: {player} {scope} {reason} {duration} {by} {cmd} {perm}.
# \n = nowa linia (np. na ekranie bana). Plik czytany jako properties (ISO-8859-1) -
# dla polskich znakow uzyj kodow \uXXXX albo trzymaj sie ASCII.
# Skasowanie klucza = uzyty zostanie wbudowany domyslny tekst.

# --- BAN ---
ban.screen=&c&lEL CARTEL &8- &cBAN\n\n&7Zakres: &f{scope}\n&7Powod: &f{reason}\n&7Wygasa: &f{duration}\n&7Nadal: &f{by}
ban.deny=&cMasz bana na tryb &f{scope}&c. Wygasa: &f{duration}&c. Powod: &f{reason}
ban.broadcast=&8[&cKARY&8] &f{player} &7zostal zbanowany &8(&7{scope}&8) &7przez &f{by}&7. Powod: &f{reason} &8[{duration}]

# --- MUTE ---
mute.notify=&cZostales wyciszony &8(&7{scope}&8)&c. Wygasa: &f{duration}&c. Powod: &f{reason}
mute.deny=&cMasz wyciszenie &8(&7{scope}&8)&c, nie mozesz pisac. Wygasa: &f{duration}&c. Powod: &f{reason}
mute.broadcast=&8[&eKARY&8] &f{player} &7zostal wyciszony &8(&7{scope}&8) &7przez &f{by}&7. &8[{duration}]

# --- KICK ---
kick.screen=&c&lEL CARTEL &8- &cWYRZUCONY\n\n&7Powod: &f{reason}\n&7Przez: &f{by}
kick.broadcast=&8[&eKARY&8] &f{player} &7zostal wyrzucony przez &f{by}&7. Powod: &f{reason}

# --- WARN ---
warn.notify=&e&lOSTRZEZENIE &7od &f{by}&7: &f{reason}
warn.broadcast=&8[&eKARY&8] &f{player} &7otrzymal ostrzezenie &8(&7{scope}&8)&7: &f{reason}

# --- FEEDBACK do admina / uzycie komendy ---
cmd.no-perm=&cBrak uprawnien &8(&7{perm}&8)&c.
cmd.usage=&7Uzyj: &f/{cmd} <gracz> [czas] [powod] [pokaz|cichy]
cmd.target-unknown=&cNie znam gracza &f{player}&c (musi byc online lub wczesniej wejsc).
cmd.no-mode=&cNie jestes na trybie. Wejdz na tryb, dodaj &f-t <tryb>&c albo uzyj &f/{cmd}proxy&c (siec).
cmd.ban.ok=&aZbanowano &f{player} &8(&7{scope}&8, &7{duration}&8)&a.
cmd.unban.ok=&aOdbanowano &f{player} &8(&7{scope}&8)&a.
cmd.unban.none=&7Brak aktywnego bana &8(&7{scope}&8)&7.
cmd.mute.ok=&aWyciszono &f{player} &8(&7{scope}&8, &7{duration}&8)&a.
cmd.unmute.ok=&aOdciszono &f{player} &8(&7{scope}&8)&a.
cmd.unmute.none=&7Brak aktywnego wyciszenia &8(&7{scope}&8)&7.
cmd.kick.ok=&aWyrzucono &f{player}&a.
cmd.kick.not-here=&7Gracz &f{player} &7nie jest na trybie &f{scope}&7.
cmd.warn.ok=&aOstrzezono &f{player} &8(&7{scope}&8)&a.

# --- GUI /ch (sektory/kanaly) ---
sector.menu.title=&8&lSEKTORY
sector.item.name=&aKANAL: &f{channel}
sector.item.players=&7Graczy: &f{players}&7/&f{cap}
sector.item.join=&eKliknij, aby dolaczyc
sector.item.current=&aJestes polaczony z tym kanalem
sector.empty=&cBrak aktywnych kanalow
sector.already=&7Jestes juz na tym kanale.
sector.switching=&7Lacze z &f{channel}&7...
sector.edge=&7To skraj swiata - dalej nie ma sektora.
